name: Auto-Update Awesome Agent Repos

on:
  schedule:
    # Run every 3 days at 00:00 UTC (08:00 Beijing time)
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force full update regardless of changes'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Discover new awesome-agent repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update_repos.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet README.md data/ index.html; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md data/ index.html
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "auto-update: ${DATE} — discovered new awesome-agent repos"
          git push

      - name: Summary
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "✅ Updated! New repos discovered and README regenerated."
          echo "📅 Date: $(date -u +"%Y-%m-%d %H:%M UTC")"

      - name: No changes summary
        if: steps.check_changes.outputs.has_changes != 'true'
        run: |
          echo "ℹ️ No new repos found. Everything is up to date."
