  --shadow-hover: 0 12px 40px rgba(15,23,42,0.14);

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }



body {

  line-height: 1.6;

    radial-gradient(700px 450px at 85% 10%, rgba(236,72,153,0.10), transparent 50%),

    linear-gradient(175deg, #f8f9ff, #f0f2fe 40%, #f5f3ff 70%, #faf9fe);

  min-height: 100vh;

  overflow-x: hidden;

}



::-webkit-scrollbar { width: 6px; height: 6px; }

::-webkit-scrollbar-track { background: transparent; }

::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 3px; }

::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.4); }



/* Orbs */

.orb { position: fixed; border-radius: 50%; filter: blur(60px); pointer-events: none; z-index: 0; }

.orb-1 { width: 360px; height: 360px; left: -100px; top: -80px; background: rgba(99,102,241,0.35); animation: drift 12s ease-in-out infinite; }

.orb-2 { width: 280px; height: 280px; right: -60px; top: 200px; background: rgba(236,72,153,0.28); animation: drift 14s ease-in-out infinite 2s; }

.orb-3 { width: 240px; height: 240px; left: 40%; bottom: -80px; background: rgba(16,185,129,0.22); animation: drift 16s ease-in-out infinite 4s; }

.orb-4 { width: 200px; height: 200px; right: 20%; bottom: 100px; background: rgba(245,158,11,0.20); animation: drift 11s ease-in-out infinite 3s; }



@keyframes drift {

  0%, 100% { transform: translate(0,0) scale(1); }

  25% { transform: translate(20px,-15px) scale(1.05); }

  50% { transform: translate(-10px,10px) scale(0.95); }

  75% { transform: translate(15px,5px) scale(1.02); }

}

/* Header (sticky) */

  backdrop-filter: blur(20px);

.header-inner {

.header .badge {

/* Search in header */

.search-box svg {

.agent-splash {

}

.agent-splash.fade-out {

  transition: opacity 0.6s ease-out;

  pointer-events: none;

}

.agent-splash canvas {

  inset: 0;

}

.splash-content {

.splash-content h2 {

  -webkit-background-clip: text;

  -webkit-text-fill-color: transparent;

  background-clip: text;

  opacity: 0;

  transform: scale(0.8);

  animation: agentTitleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;

}

.splash-content p {

  font-size: 16px;

  color: var(--muted);

  margin-top: 8px;

  opacity: 0;

  animation: agentSubIn 0.5s ease-out 1.3s forwards;

}

.splash-ring {

  position: absolute;

  top: 50%; left: 50%;

  transform: translate(-50%, -50%);

  border: 2px solid rgba(99,102,241,0.3);

  border-radius: 50%;

  opacity: 0;

  animation: ringPulse 1.2s ease-out forwards;

}

.splash-ring:nth-child(1) { width: 80px; height: 80px; animation-delay: 0.3s; }

.splash-ring:nth-child(2) { width: 160px; height: 160px; animation-delay: 0.5s; }

.splash-ring:nth-child(3) { width: 260px; height: 260px; animation-delay: 0.7s; }

@keyframes ringPulse {

  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }

  50% { opacity: 0.6; }

  100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }

}

@keyframes agentTitleIn {

  to { opacity: 1; transform: scale(1); }

}

@keyframes agentSubIn {

  to { opacity: 1; }

}

<script>

// Agent splash animation - network pulse

(function() {

  const canvas = document.getElementById('splashCanvas');

  const ctx = canvas.getContext('2d');

  const splash = document.getElementById('agentSplash');



  let W, H, nodes = [], edges = [], frame = 0;



  function resize() {

    W = canvas.width = window.innerWidth;

    H = canvas.height = window.innerHeight;

  }

  resize();

  window.addEventListener('resize', resize);



  // Generate random nodes

  const nodeCount = 30;

  for (let i = 0; i < nodeCount; i++) {

    nodes.push({

      x: Math.random() * W,

      y: Math.random() * H,

      r: 3 + Math.random() * 4,

      delay: Math.random() * 40,

      opacity: 0

    });

  }



  // Generate edges between nearby nodes

  for (let i = 0; i < nodes.length; i++) {

    for (let j = i + 1; j < nodes.length; j++) {

      const dx = nodes[i].x - nodes[j].x;

      const dy = nodes[i].y - nodes[j].y;

      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 250) {

        edges.push({ from: i, to: j, delay: Math.random() * 50, opacity: 0 });

      }

    }

  }



  function draw() {

    ctx.clearRect(0, 0, W, H);

    frame++;



    // Draw edges

    edges.forEach(e => {

      if (frame > e.delay) e.opacity = Math.min(1, e.opacity + 0.03);

      const a = nodes[e.from], b = nodes[e.to];

      ctx.beginPath();

      ctx.moveTo(a.x, a.y);

      ctx.lineTo(b.x, b.y);

      ctx.strokeStyle = `rgba(99,102,241,${e.opacity * 0.25})`;

      ctx.lineWidth = 1;

      ctx.stroke();

    });



    // Draw nodes

    nodes.forEach(n => {

      if (frame > n.delay) n.opacity = Math.min(1, n.opacity + 0.04);

      ctx.beginPath();

      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);

      ctx.fillStyle = `rgba(99,102,241,${n.opacity * 0.6})`;

      ctx.fill();

      // Glow

      ctx.beginPath();

      ctx.arc(n.x, n.y, n.r + 4, 0, Math.PI * 2);

      ctx.fillStyle = `rgba(99,102,241,${n.opacity * 0.12})`;

      ctx.fill();

    });



    if (frame < 120) {

      requestAnimationFrame(draw);

    }

  }

  draw();



  // Fade out

  setTimeout(() => {

    splash.classList.add('fade-out');

    setTimeout(() => splash.remove(), 600);

  }, 2600);

})();

</script>

<script>

const CAT_META = {

let currentSort = 'stars';

let searchQuery = '';



function formatStars(n) {

  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';

  return n.toString();

}



function getFilteredByCategory(cat) {

  let repos = REPOS.filter(r => r.c === cat);

  if (searchQuery) {

    const q = searchQuery.toLowerCase();

    repos = repos.filter(r =>

      r.r.toLowerCase().includes(q) ||

      r.d.toLowerCase().includes(q) ||

      r.t.some(t => String(t).toLowerCase().includes(q))

    );

  }

  if (currentSort === 'stars') {

    repos.sort((a, b) => b.s - a.s);

  } else {

    repos.sort((a, b) => a.r.localeCompare(b.r));

  }

  return repos;

}



function renderBoard() {

  const board = document.getElementById('board');

  const noResults = document.getElementById('noResults');

  let totalVisible = 0;

  let html = '';



  const catsToShow = CAT_ORDER.filter(c => CAT_META[c]);

  // Also include any categories not in CAT_ORDER

  const allCats = new Set(REPOS.map(r => r.c));

  allCats.forEach(c => { if (!CAT_ORDER.includes(c) && CAT_META[c]) catsToShow.push(c); });



  catsToShow.forEach(cat => {

    const repos = getFilteredByCategory(cat);

    totalVisible += repos.length;

    const meta = CAT_META[cat] || { icon: '📦', label: cat, labelZh: '' };



    const cardsHtml = repos.length > 0 ? repos.map(r => {

      const [owner, name] = r.r.includes('/') ? r.r.split('/') : ['', r.r];

      const tagClass = 'tag-' + r.c;

      const tagsHtml = r.t.filter(t => t !== r.c && t !== 'auto-discovered').slice(0, 2)

        .map(t => `<span class="tag ${tagClass}">${t}</span>`).join('');



      return `<a class="repo-card" href="https://github.com/${r.r}" target="_blank" rel="noopener">

        <div class="top">

          <span class="name">${owner ? `<span class="owner">${owner}/</span>` : ''}${name}</span>

          <span class="stars"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>${formatStars(r.s)}</span>

        </div>

        ${r.d ? `<div class="desc">${r.d}</div>` : ''}

        ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}

      </a>`;

    }).join('') : '<div style="padding:16px;text-align:center;font-size:12px;color:var(--muted);">No results</div>';



    html += `<div class="column">

      <div class="col-header">

        <div class="col-title">

          <span class="col-icon">${meta.icon}</span>

          <span class="col-name">${meta.label}</span>

          <span class="col-name-zh">${meta.labelZh}</span>

          <span class="col-cnt">${repos.length}</span>

        </div>

      </div>

      <div class="col-body">${cardsHtml}</div>

    </div>`;

  });



  board.innerHTML = html;

  noResults.style.display = totalVisible === 0 ? 'block' : 'none';

  document.getElementById('resultCount').textContent = totalVisible > 0 ? totalVisible + '' : '';

}



function setSort(sort) {

  currentSort = sort;

  document.querySelectorAll('.sort-toggle button').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));

  renderBoard();

}



const searchInput = document.getElementById('searchInput');

let searchTimer;

searchInput.addEventListener('input', () => {

  clearTimeout(searchTimer);

  searchTimer = setTimeout(() => {

    searchQuery = searchInput.value.trim();

    renderBoard();

  }, 200);

});



// Particles

function initParticles() {

  const canvas = document.getElementById('particles');

  const ctx = canvas.getContext('2d');

  let particles = [];

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

  resize(); window.addEventListener('resize', resize);

  for (let i = 0; i < 35; i++) {

    particles.push({

      x: Math.random() * canvas.width, y: Math.random() * canvas.height,

      r: Math.random() * 1.5 + 0.5,

      vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,

      a: Math.random() * 0.3 + 0.1,

    });

  }

  function draw() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < particles.length; i++) {

      const p = particles[i];

      p.x += p.vx; p.y += p.vy;

      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;

      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);

      ctx.fillStyle = `rgba(99,102,241,${p.a})`; ctx.fill();

      for (let j = i + 1; j < particles.length; j++) {

        const q = particles[j];

        const dx = p.x - q.x, dy = p.y - q.y;

        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 120) {

          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);

          ctx.strokeStyle = `rgba(99,102,241,${0.06 * (1 - dist / 120)})`;

          ctx.lineWidth = 0.5; ctx.stroke();

        }

      }

    }

    requestAnimationFrame(draw);

  }

  draw();

}



document.addEventListener('DOMContentLoaded', () => {

  renderBoard();

  initParticles();

});
